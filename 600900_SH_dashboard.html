// ===== Helpers =====
function fmtDate(d) {
  return d.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
}

// ===== Header =====
(function(){
  var n = CLOSE.length;
  var last = CLOSE[n-1], first = CLOSE[0];
  var chg = (last - first) / first * 100;
  var hi = Math.max.apply(null, HIGH);
  var lo = Math.min.apply(null, LOW);
  var vol = VOL[n-1];
  document.getElementById('date-range').textContent = fmtDate(D[0]) + ' ~ ' + fmtDate(D[n-1]) + '  (共' + n + '个交易日)';
  var sr = document.getElementById('stats-row');
  sr.innerHTML =
    '<div class="stat-mini"><div class="lbl">最新收盘</div><div class="val up">' + last.toFixed(2) + '</div></div>' +
    '<div class="stat-mini"><div class="lbl">涨跌幅</div><div class="val ' + (chg>=0?'up':'down') + '">' + (chg>=0?'+':'') + chg.toFixed(2) + '%</div></div>' +
    '<div class="stat-mini"><div class="lbl">最高</div><div class="val up">' + hi.toFixed(2) + '</div></div>' +
    '<div class="stat-mini"><div class="lbl">最低</div><div class="val down">' + lo.toFixed(2) + '</div></div>' +
    '<div class="stat-mini"><div class="lbl">最新成交量</div><div class="val">' + (vol/10000).toFixed(0) + '万手</div></div>' +
    '<div class="stat-mini"><div class="lbl">数据天数</div><div class="val">' + n + ' 日</div></div>';
  document.getElementById('gen-time').textContent = new Date().toLocaleString('zh-CN');
})();

// ===== Chart Init =====
var chartMain = echarts.init(document.getElementById('chart-main'));
var chartVol  = echarts.init(document.getElementById('chart-vol'));
var chartRSI = echarts.init(document.getElementById('chart-rsi'));
var chartMACD = echarts.init(document.getElementById('chart-macd'));
var chartBB   = echarts.init(document.getElementById('chart-bb'));
var chartATR  = echarts.init(document.getElementById('chart-atr'));
var charts = [chartMain, chartVol, chartRSI, chartMACD, chartBB, chartATR];

var gridMain = {left:'8%',right:'5%',top:'10%',bottom:'18%'};
var gridSub  = {left:'8%',right:'5%',top:'8%',bottom:'18%'};
var axisLabel = {color:'#8b949e',fontSize:10};
var splitLine = {lineStyle:{color:'#21262d'}};

// echarts candlestick data format: [open, close, high, low]
function makeKData() {
  var arr = [];
  for (var i = 0; i < CLOSE.length; i++) {
    arr.push([O[i], CLOSE[i], HIGH[i], LOW[i]]);
  }
  return arr;
}

function makeVolData() {
  var arr = [];
  for (var i = 0; i < CLOSE.length; i++) {
    arr.push({
      value: [Dfmt[i], VOL[i]],
      itemStyle: {color: CLOSE[i] >= O[i] ? '#ef4444' : '#22c55e'}
    });
  }
  return arr;
}

function makeLineData(arr) {
  var r = [];
  for (var i = 0; i < arr.length; i++) {
    if (arr[i] === null) r.push([Dfmt[i], null]);
    else r.push([Dfmt[i], arr[i]]);
  }
  return r;
}

function makeConstLine(v) {
  var r = [];
  for (var i = 0; i < Dfmt.length; i++) r.push([Dfmt[i], v]);
  return r;
}

function getRangeIdx(range) {
  if (range === 'all') return 0;
  var days = {'1m':30,'3m':90,'6m':180}[range];
  var now = new Date(D[D.length-1].slice(0,4)+'-'+D[D.length-1].slice(4,6)+'-'+D[D.length-1].slice(6,8));
  var target = new Date(now.getTime() - days * 86400000);
  for (var i = 0; i < D.length; i++) {
    var d = new Date(D[i].slice(0,4)+'-'+D[i].slice(4,6)+'-'+D[i].slice(6,8));
    if (d >= target) return i;
  }
  return 0;
}

var currentRange = '1m';
var zoomStart = 0, zoomEnd = 100;

function applyZoom() {
  var startIdx = getRangeIdx(currentRange);
  var n = CLOSE.length;
  zoomStart = Math.round(startIdx / n * 100);
  zoomEnd = 100;
  charts.forEach(function(c) {
    c.dispatchAction({type: 'dataZoom', start: zoomStart, end: zoomEnd});
  });
}

document.getElementById('time-btns').addEventListener('click', function(e) {
  var btn = e.target.closest('.time-btn');
  if (!btn) return;
  document.querySelectorAll('.time-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentRange = btn.dataset.range;
  applyZoom();
});

function updatePanelValues() {
  var n = CLOSE.length - 1;
  var el;
  el = document.getElementById('p-close'); if (el) el.textContent = CLOSE[n].toFixed(2);
  el = document.getElementById('p-chg');
  if (el) el.innerHTML = '<span class="' + (CLOSE[n]>=CLOSE[0]?'up':'down') + '">' + ((CLOSE[n]/CLOSE[0]-1)*100).toFixed(2) + '%</span>';
  el = document.getElementById('p-ma5'); if (el && MA5[n]) el.textContent = MA5[n].toFixed(2);
  el = document.getElementById('p-ma20'); if (el && MA20[n]) el.textContent = MA20[n].toFixed(2);
  el = document.getElementById('p-ma60'); if (el && MA60[n]) el.textContent = MA60[n].toFixed(2);
  el = document.getElementById('p-vol'); if (el && VOL[n]) el.textContent = (VOL[n]/10000).toFixed(0) + '万手';
  var vol5 = 0, cnt = 0;
  for (var j = Math.max(0, n-4); j <= n; j++) { vol5 += VOL[j]; cnt++; }
  el = document.getElementById('p-vol5'); if (el) el.textContent = ((vol5/cnt)/10000).toFixed(0) + '万手';

  var rsi = RSI_ARR[n];
  el = document.getElementById('rsi-curr'); if (el) el.textContent = rsi !== null ? rsi.toFixed(1) : '--';
  el = document.getElementById('rsi-signal');
  if (el) {
    if (rsi === null) { el.textContent = '--'; el.className = 'ind-signal neutral'; }
    else if (rsi > 70) { el.textContent = '超买'; el.className = 'ind-signal buy'; }
    else if (rsi < 30) { el.textContent = '超卖'; el.className = 'ind-signal sell'; }
    else { el.textContent = '中性'; el.className = 'ind-signal neutral'; }
  }

  el = document.getElementById('macd-dif-v'); if (el && MACD_DIF[n] !== null) el.textContent = MACD_DIF[n].toFixed(3);
  el = document.getElementById('macd-dea-v'); if (el && MACD_DEA[n] !== null) el.textContent = MACD_DEA[n].toFixed(3);
  el = document.getElementById('macd-bar-v'); if (el && MACD_BAR[n] !== null) el.textContent = MACD_BAR[n].toFixed(3);
  el = document.getElementById('macd-signal');
  if (el && MACD_DIF[n] !== null && MACD_DEA[n] !== null) {
    if (MACD_DIF[n] > MACD_DEA[n] && MACD_BAR[n] > 0) { el.textContent = '金叉'; el.className = 'ind-signal buy'; }
    else if (MACD_DIF[n] < MACD_DEA[n] && MACD_BAR[n] < 0) { el.textContent = '死叉'; el.className = 'ind-signal sell'; }
    else { el.textContent = '中性'; el.className = 'ind-signal neutral'; }
  }

  el = document.getElementById('bb-upper-v'); if (el && BB_UPPER[n] !== null) el.textContent = BB_UPPER[n].toFixed(2);
  el = document.getElementById('bb-mid-v'); if (el && BB_MID[n] !== null) el.textContent = BB_MID[n].toFixed(2);
  el = document.getElementById('bb-lower-v'); if (el && BB_LOWER[n] !== null) el.textContent = BB_LOWER[n].toFixed(2);
  el = document.getElementById('bb-pct-v'); if (el && BB_PCT[n] !== null) el.textContent = (BB_PCT[n]*100).toFixed(1) + '%';
  el = document.getElementById('bb-signal');
  if (el && BB_PCT[n] !== null) {
    if (BB_PCT[n] > 1) { el.textContent = '突破上轨'; el.className = 'ind-signal buy'; }
    else if (BB_PCT[n] < 0) { el.textContent = '跌破下轨'; el.className = 'ind-signal sell'; }
    else { el.textContent = '轨道内'; el.className = 'ind-signal neutral'; }
  }

  el = document.getElementById('atr-val-v'); if (el && ATR_ARR[n] !== null) el.textContent = ATR_ARR[n].toFixed(3);
  el = document.getElementById('atr-pct-v'); if (el && ATR_ARR[n] !== null) el.textContent = (ATR_ARR[n]/CLOSE[n]*100).toFixed(2) + '%';
}

    xAxis: {type:'category', data:Dfmt, axisLabel:axisLabel, axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis: {type:'value', scale:true, axisLabel:axisLabel, axisLine:{lineStyle:{color:'#30363d'}}, splitLine:splitLine},
    dataZoom: [{type:'inside', start:zoomStart, end:zoomEnd}, {type:'slider', start:zoomStart, end:zoomEnd, height:20, bottom:10,
      fillerColor:'rgba(88,166,255,0.2)', borderColor:'#30363d', textStyle:{color:'#8b949e'}}],
    series: [
      {name:'DIF', type:'line', data:makeLineData(MACD_DIF), smooth:true, lineStyle:{width:1.5,color:'#ef4444'}, symbol:'none'},
      {name:'DEA', type:'line', data:makeLineData(MACD_DEA), smooth:true, lineStyle:{width:1.5,color:'#22c55e'}, symbol:'none'},
      {type:'bar', name:'MACD', data:barData, barWidth:'60%'}
    ]
  });

  chartBB.setOption({
    grid: gridSub,
    tooltip: {trigger:'axis'},
    legend: {data:['收盘','上轨','中轨','下轨'], top:0, textStyle:{color:'#8b949e',fontSize:10}},
    xAxis: {type:'category', data:Dfmt, axisLabel:axisLabel, axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis: {type:'value', scale:true, axisLabel:axisLabel, axisLine:{lineStyle:{color:'#30363d'}}, splitLine:splitLine},
    dataZoom: [{type:'inside', start:zoomStart, end:zoomEnd}, {type:'slider', start:zoomStart, end:zoomEnd, height:20, bottom:10,
      fillerColor:'rgba(88,166,255,0.2)', borderColor:'#30363d', textStyle:{color:'#8b949e'}}],
    series: [
      {name:'收盘', type:'line', data:makeLineData(CLOSE), smooth:true, lineStyle:{width:1.5,color:'#58a6ff'}, symbol:'none'},
      {name:'上轨', type:'line', data:makeLineData(BB_UPPER), lineStyle:{width:1,color:'#a855f7'}, symbol:'none'},
      {name:'中轨', type:'line', data:makeLineData(BB_MID), lineStyle:{width:1,color:'#a855f7',type:'dashed'}, symbol:'none'},
      {name:'下轨', type:'line', data:makeLineData(BB_LOWER), lineStyle:{width:1,color:'#a855f7'}, symbol:'none'}
    ]
  });

  chartATR.setOption({
    grid: gridSub,
    tooltip: {trigger:'axis'},
    legend: {data:['ATR'], top:0, textStyle:{color:'#8b949e',fontSize:10}},
    xAxis: {type:'category', data:Dfmt, axisLabel:axisLabel, axisLine:{lineStyle:{color:'#30363d'}}},
    yAxis: {type:'value', scale:true, axisLabel:axisLabel, axisLine:{lineStyle:{color:'#30363d'}}, splitLine:splitLine},
    dataZoom: [{type:'inside', start:zoomStart, end:zoomEnd}, {type:'slider', start:zoomStart, end:zoomEnd, height:20, bottom:10,
      fillerColor:'rgba(88,166,255,0.2)', borderColor:'#30363d', textStyle:{color:'#8b949e'}}],
    series: [
      {name:'ATR', type:'line', data:makeLineData(ATR_ARR), smooth:true, lineStyle:{width:1.5,color:'#8b5cf6'}, symbol:'none',
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(139,92,246,0.2)'},{offset:1,color:'rgba(139,92,246,0.01)'}])}}
    ]
  });

  updatePanelValues();
}

  // ===== 横轴联动：所有图表 dataZoom 同步 =====
  (function(){
    var isLinking = false;
    charts.forEach(function(c){
      c.on('dataZoom', function(params){
        if (isLinking) return;
        isLinking = true;
        var start = params.start;
        var end   = params.end;
        charts.forEach(function(other){
          if (other !== c) {
            other.dispatchAction({type:'dataZoom', start:start, end:end});
          }
        });
        setTimeout(function(){ isLinking = false; }, 50);
      });
    });
  })();

  renderAll();
setTimeout(applyZoom, 100);

window.addEventListener('resize', function() {
  charts.forEach(function(c) { c.resize(); });
});
</script>
